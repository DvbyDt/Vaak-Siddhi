<svg viewBox="0 0 960 680" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0818"/>
      <stop offset="100%" style="stop-color:#1a0d30"/>
    </linearGradient>
    <linearGradient id="saffron" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B2B"/><stop offset="100%" style="stop-color:#D94F10"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8B84B"/><stop offset="100%" style="stop-color:#C8902B"/>
    </linearGradient>
    <linearGradient id="indigo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1"/><stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981"/><stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0EA5E9"/><stop offset="100%" style="stop-color:#0284C7"/>
    </linearGradient>
    <marker id="arrowW" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="rgba(255,255,255,0.35)"/>
    </marker>
    <marker id="arrowO" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#FF6B2B"/>
    </marker>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#E8B84B"/>
    </marker>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="680" fill="url(#bgGrad)" rx="16"/>
  <rect x="1" y="1" width="958" height="678" fill="none" stroke="rgba(255,107,43,0.2)" rx="15" stroke-width="1"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#F2EBE0" font-size="20" font-weight="700" letter-spacing="1.5">🕉  VaakSiddhi (वाक्सिद्धि) — System Architecture</text>
  <text x="480" y="56" text-anchor="middle" fill="rgba(232,184,75,0.7)" font-size="11" letter-spacing="3">MASTERY OF VOICE · FREE MVP → 1M+ USERS</text>

  <!-- ══ LAYER 1: USER ══ -->
  <rect x="330" y="74" width="300" height="62" rx="14" fill="rgba(255,107,43,0.1)" stroke="#FF6B2B" stroke-width="1.5" filter="url(#glow)"/>
  <text x="480" y="99" text-anchor="middle" fill="#FF8C55" font-size="14" font-weight="600">📱  USER  (Browser / Mobile App)</text>
  <text x="480" y="116" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">Records voice · Reads shlokas · Views AI feedback</text>
  <text x="480" y="130" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-size="10">Web Speech API — built into Chrome/Edge, FREE</text>
  <line x1="480" y1="136" x2="480" y2="158" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowW)"/>

  <!-- ══ LAYER 2: FRONTEND ══ -->
  <rect x="300" y="160" width="360" height="62" rx="14" fill="rgba(99,102,241,0.1)" stroke="#6366F1" stroke-width="1.5"/>
  <text x="480" y="185" text-anchor="middle" fill="#A5B4FC" font-size="14" font-weight="600">⚛  React Frontend  (Vercel / Netlify)</text>
  <text x="480" y="202" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">Home · Library · Practice · Results screens</text>
  <text x="480" y="216" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-size="10">Stage 1: Vercel Free  →  Stage 3: Vercel Pro ($20/mo)</text>
  <line x1="480" y1="222" x2="480" y2="248" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowW)"/>

  <!-- ══ LAYER 3: BACKEND ══ -->
  <rect x="300" y="250" width="360" height="62" rx="14" fill="rgba(16,185,129,0.08)" stroke="#10B981" stroke-width="1.5"/>
  <text x="480" y="275" text-anchor="middle" fill="#6EE7B7" font-size="14" font-weight="600">🔒  FastAPI Backend  (Railway / Render)</text>
  <text x="480" y="292" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">API proxy · Rate limiting · Key safety · Auth</text>
  <text x="480" y="308" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-size="10">Stage 1: Free tier (500 req/day)  →  Stage 3: $7–25/mo</text>

  <!-- Left arrow to STT -->
  <line x1="300" y1="281" x2="208" y2="281" stroke="#FF6B2B" stroke-width="1.5" marker-end="url(#arrowO)"/>
  <!-- Right arrow to LLM -->
  <line x1="660" y1="281" x2="752" y2="281" stroke="#FF6B2B" stroke-width="1.5" marker-end="url(#arrowO)"/>
  <!-- Down arrow to DB -->
  <line x1="480" y1="312" x2="480" y2="362" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowW)"/>

  <!-- ══ LEFT: STT ══ -->
  <rect x="38" y="244" width="262" height="76" rx="14" fill="rgba(14,165,233,0.08)" stroke="#0EA5E9" stroke-width="1.5"/>
  <text x="169" y="269" text-anchor="middle" fill="#7DD3FC" font-size="13" font-weight="700">🎤  SPEECH-TO-TEXT</text>
  <text x="169" y="287" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="11">Stage 1: Web Speech API (Free)</text>
  <text x="169" y="303" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10.5">Stage 2: OpenAI Whisper API ($0.006/min)</text>
  <text x="169" y="315" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="10">Stage 3: Self-hosted GPU — RunPod/Modal</text>

  <!-- Whisper detail -->
  <rect x="55" y="328" width="228" height="28" rx="7" fill="rgba(14,165,233,0.07)" stroke="rgba(14,165,233,0.2)" stroke-width="1"/>
  <text x="169" y="343" text-anchor="middle" fill="rgba(125,211,252,0.7)" font-size="10">Sanskrit fine-tuned Whisper · 15.4% WER</text>
  <text x="169" y="353" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="9">ai4bharat/whisper-medium-hi · HuggingFace</text>

  <!-- ══ RIGHT: LLM ══ -->
  <rect x="660" y="244" width="262" height="76" rx="14" fill="rgba(139,92,246,0.08)" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="791" y="269" text-anchor="middle" fill="#C4B5FD" font-size="13" font-weight="700">🧠  LLM FEEDBACK ENGINE</text>
  <text x="791" y="287" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="11">Stage 1: Claude (via browser) — Free</text>
  <text x="791" y="303" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10.5">Stage 2: Groq/Llama 3.3 (14,400 req/day free)</text>
  <text x="791" y="315" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="10">Stage 3: Claude Sonnet / GPT-4o</text>

  <!-- LLM detail -->
  <rect x="677" y="328" width="228" height="28" rx="7" fill="rgba(139,92,246,0.07)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <text x="791" y="343" text-anchor="middle" fill="rgba(192,132,252,0.7)" font-size="10">Phonetic comparison · Hindi/English context</text>
  <text x="791" y="353" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="9">Score + Grade + Tips + Phonetic breakdown</text>

  <!-- ══ LAYER 4: DATABASE ══ -->
  <rect x="300" y="364" width="360" height="62" rx="14" fill="rgba(14,165,233,0.07)" stroke="rgba(14,165,233,0.35)" stroke-width="1.5"/>
  <text x="480" y="390" text-anchor="middle" fill="#7DD3FC" font-size="14" font-weight="600">🗄  Supabase  (PostgreSQL)</text>
  <text x="480" y="407" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">User progress · Practice history · Scores · Streaks</text>
  <text x="480" y="422" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-size="10">Stage 1: Free (50K users)  →  Stage 3: $25/mo</text>

  <!-- Static JSON side box -->
  <rect x="680" y="364" width="242" height="62" rx="14" fill="rgba(232,184,75,0.07)" stroke="rgba(232,184,75,0.3)" stroke-width="1.5"/>
  <text x="801" y="388" text-anchor="middle" fill="#F5D080" font-size="13" font-weight="700">📜  SHLOKA DATABASE</text>
  <text x="801" y="405" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">700 verses · Static JSON · ~500KB</text>
  <text x="801" y="420" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="10">Sanskrit · Hindi · English · Transliteration</text>
  <line x1="660" y1="395" x2="680" y2="395" stroke="rgba(232,184,75,0.4)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Provider abstraction bracket -->
  <rect x="38" y="365" width="250" height="40" rx="8" fill="rgba(255,107,43,0.06)" stroke="rgba(255,107,43,0.2)" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="163" y="381" text-anchor="middle" fill="rgba(255,107,43,0.75)" font-size="11" font-weight="600">⚡ PROVIDER ABSTRACTION LAYER</text>
  <text x="163" y="397" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="9.5">Swap STT or LLM provider in 1 line of code</text>

  <!-- ══ COST TABLE ══ -->
  <rect x="30" y="450" width="900" height="206" rx="14" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="480" y="474" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="11" letter-spacing="2">SCALING COST BREAKDOWN  ·  ALL PRICES USD/MONTH</text>

  <!-- Table header row -->
  <line x1="50" y1="482" x2="910" y2="482" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="100" y="498" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="11" font-weight="600">STAGE</text>
  <text x="230" y="498" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="11" font-weight="600">USERS</text>
  <text x="375" y="498" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="11" font-weight="600">SPEECH-TO-TEXT</text>
  <text x="530" y="498" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="11" font-weight="600">LLM FEEDBACK</text>
  <text x="690" y="498" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="11" font-weight="600">HOSTING + DB</text>
  <text x="855" y="498" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="11" font-weight="600">TOTAL</text>
  <line x1="50" y1="504" x2="910" y2="504" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Row 1: MVP -->
  <rect x="40" y="508" width="880" height="30" rx="6" fill="rgba(74,222,128,0.04)"/>
  <text x="100" y="528" text-anchor="middle" fill="#4ADE80" font-size="12" font-weight="700">MVP</text>
  <text x="230" y="528" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="12">0 – 1,000</text>
  <text x="375" y="528" text-anchor="middle" fill="#4ADE80" font-size="12">₹0  (Web Speech API)</text>
  <text x="530" y="528" text-anchor="middle" fill="#4ADE80" font-size="12">₹0  (Claude free)</text>
  <text x="690" y="528" text-anchor="middle" fill="#4ADE80" font-size="12">₹0  (Vercel + Supabase free)</text>
  <text x="855" y="528" text-anchor="middle" fill="#4ADE80" font-size="14" font-weight="800">₹0 / mo</text>

  <!-- Row 2: Growth -->
  <text x="100" y="558" text-anchor="middle" fill="#E8B84B" font-size="12" font-weight="700">GROWTH</text>
  <text x="230" y="558" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="12">10,000</text>
  <text x="375" y="558" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="12">~$18  (Whisper API)</text>
  <text x="530" y="558" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="12">~$15  (Groq paid)</text>
  <text x="690" y="558" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="12">$7 Railway + $0 Supabase</text>
  <text x="855" y="558" text-anchor="middle" fill="#E8B84B" font-size="13" font-weight="700">~$40 / mo</text>

  <!-- Row 3: Scale -->
  <text x="100" y="588" text-anchor="middle" fill="#F87171" font-size="12" font-weight="700">SCALE</text>
  <text x="230" y="588" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="12">100,000</text>
  <text x="375" y="588" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="12">~$90  (self-host GPU)</text>
  <text x="530" y="588" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="12">~$120  (Claude Sonnet)</text>
  <text x="690" y="588" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="12">$25 Railway Pro + $25 Supabase</text>
  <text x="855" y="588" text-anchor="middle" fill="#F87171" font-size="13" font-weight="700">~$260 / mo</text>

  <!-- Row 4: Unicorn -->
  <text x="100" y="618" text-anchor="middle" fill="rgba(192,132,252,0.9)" font-size="12" font-weight="700">UNICORN</text>
  <text x="230" y="618" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12">1,000,000</text>
  <text x="375" y="618" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">Multi-GPU cluster</text>
  <text x="530" y="618" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">Fine-tuned model</text>
  <text x="690" y="618" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">AWS multi-region</text>
  <text x="855" y="618" text-anchor="middle" fill="rgba(192,132,252,0.9)" font-size="13" font-weight="700">~$2,000 / mo</text>

  <!-- Revenue note -->
  <text x="480" y="648" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-size="10">At 1M users × ₹99/mo subscription = ₹99M/mo revenue on ~₹165K infra cost · 99.8% margin</text>

  <!-- Footnote -->
  <text x="480" y="668" text-anchor="middle" fill="rgba(255,107,43,0.4)" font-size="10" font-style="italic">Design principle: Provider abstraction layer → swap any service in 1 line · Static shloka DB → zero content scaling cost</text>
</svg>
